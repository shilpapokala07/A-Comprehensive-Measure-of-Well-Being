<!DOCTYPE html>
<html>

<head>
    <title>HDI Prediction</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
            color:#0d6efd;
        }

        label{
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
        }

        input[type=submit]{
            background:#0d6efd;
            color:white;
            border:none;
            cursor:pointer;
            font-size:18px;
        }

        input[type=submit]:hover{
            background:#084298;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Human Development Index Prediction</h2>

<form action="/predict" method="POST">

<label>Country</label>

<select name="country">

<option>India</option>
<option>United States</option>
<option>China</option>
<option>Japan</option>
<option>Australia</option>
<option>Canada</option>
<option>Germany</option>
<option>Brazil</option>

</select>

<label>Life Expectancy</label>

<input
type="number"
name="life"
min="20"
max="90"
step="0.1"
required>

<label>Mean Years of Schooling</label>

<input
type="number"
name="schooling"
min="0"
max="20"
step="0.1"
required>

<label>GNI per Capita</label>

<input
type="number"
name="gni"
min="100"
max="150000"
step="1"
required>

<label>Internet Users (%)</label>

<input
type="number"
name="internet"
min="0"
max="100"
step="0.1"
required>

<input type="submit" value="Predict">

</form>

</div>

</body>

</html>
