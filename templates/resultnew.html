<!DOCTYPE html>
<html>

<head>
    <title>Prediction Result</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
        }

        .container{
            width:500px;
            margin:100px auto;
            background:white;
            padding:30px;
            text-align:center;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:#0d6efd;
        }

        h2{
            color:green;
        }

        a{
            text-decoration:none;
            background:#0d6efd;
            color:white;
            padding:10px 20px;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Prediction Result</h1>

<h2>{{ prediction_text }}</h2>

<p><strong>Country:</strong> {{ country }}</p>

<br>

<a href="/Prediction">Predict Again</a>

</div>

</body>

</html>
